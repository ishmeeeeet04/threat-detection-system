services:
  - type: web
    name: threat-detection-system
    env: python
    buildCommand: pip install -r requirements.txt && python ml/train_model.py && python -c "from backend.utils.database import init_database, load_scored_logs_to_db; init_database(); load_scored_logs_to_db()"
    startCommand: gunicorn --chdir backend app:create_app --bind 0.0.0.0:$PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0